document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dth:7px; height:7px; border-radius:50%; background:#ff3355; box-shadow:0 0 16px 4px rgba(232,0,45,0.9);\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"font-size:21px; font-weight:500; letter-spacing:0.34em; padding-left:0.34em;\">CREATE<\u002Fdiv>\n      <p style=\"margin:18px 0 0; font-size:15px; line-height:1.75; color:rgba(255,255,255,0.55); text-align:center;\">Build worlds.<br>Tell stories.<br>Share your vision.<\u002Fp>\n      <div style=\"width:46px; height:1px; margin:26px 0 0; background:rgba(232,0,45,0.8);\"><\u002Fdiv>\n      <div data-cta=\"\" style=\"display:flex; align-items:center; justify-content:space-between; width:100%; margin-top:auto; padding-top:24px;\">\n        <span style=\"font-size:12px; font-weight:600; letter-spacing:0.2em; color:#E8002D;\">ENTER CREATOR PORTAL<\u002Fspan>\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8002D\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <!-- ===== OR ===== -->\n    <div style=\"flex:0 0 132px; display:flex; align-items:center; justify-content:center;\">\n      <div style=\"font-size:13px; font-weight:500; letter-spacing:0.3em; color:rgba(255,255,255,0.5); padding-left:0.3em;\">OR<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== EXPLORE ===== -->\n    <a href=\"MOVIANX%20Experience.html\" data-tilt=\"\" data-accent=\"white\" style=\"position:relative; flex:0 1 364px; min-height:438px; display:flex; flex-direction:column; align-items:center; padding:46px 32px 30px; border-radius:18px; text-decoration:none; color:#fff; overflow:hidden; border:1px solid rgba(255,255,255,0.12); background:radial-gradient(120% 55% at 50% 26%, rgba(255,255,255,0.04), transparent 60%), linear-gradient(180deg, rgba(10,10,12,0.92), rgba(3,3,4,0.96)); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); box-shadow:0 30px 80px rgba(0,0,0,0.6); transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s ease, border-color .5s ease;\">\n      <div data-glow=\"\" style=\"position:absolute; inset:-1px; border-radius:18px; pointer-events:none; opacity:0; transition:opacity .5s ease; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.35), 0 0 60px rgba(255,235,210,0.18);\"><\u002Fdiv>\n\n      <!-- doorway portal -->\n      <div style=\"position:relative; width:150px; height:108px; margin-bottom:24px; display:flex; align-items:flex-end; justify-content:center;\">\n        <div style=\"position:absolute; left:50%; top:0; transform:translateX(-50%); width:128px; height:128px; border-radius:50%; background:radial-gradient(circle at 50% 36%, rgba(70,64,68,0.45), rgba(9,9,11,0.96) 68%); box-shadow:inset 0 0 26px rgba(0,0,0,0.9), inset 0 2px 14px rgba(255,235,210,0.18), 0 0 0 1px rgba(255,255,255,0.05);\"><\u002Fdiv>\n        <div data-doorglow=\"\" style=\"position:absolute; left:50%; top:46px; transform:translate(-50%,-50%); width:60px; height:88px; pointer-events:none; background:radial-gradient(ellipse at 50% 50%, rgba(255,235,205,0.85), rgba(255,210,165,0.2) 55%, transparent 75%); filter:blur(5px); animation:mxp-doorbreathe 4.6s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute; left:50%; top:20px; transform:translateX(-50%); width:24px; height:54px; border-radius:9px 9px 1px 1px; background:linear-gradient(180deg, #ffffff, #ffe6c2 65%, #ffd49c); box-shadow:0 0 22px 5px rgba(255,228,188,0.8), 0 0 50px 14px rgba(255,205,155,0.35);\"><\u002Fdiv>\n        <div style=\"position:absolute; left:50%; top:34px; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; z-index:2;\">\n          <div style=\"width:7px; height:7px; border-radius:50%; background:#070608;\"><\u002Fdiv>\n          <div style=\"width:10px; height:26px; margin-top:1px; border-radius:5px 5px 0 0; background:#070608;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div data-pool=\"\" style=\"position:absolute; left:50%; bottom:-4px; transform:translateX(-50%); width:96px; height:40px; pointer-events:none; background:radial-gradient(ellipse at 50% 0%, rgba(255,228,190,0.5), transparent 70%); filter:blur(5px); animation:mxp-poolpulse 4.6s ease-in-out infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:21px; font-weight:500; letter-spacing:0.34em; padding-left:0.34em;\">EXPLORE<\u002Fdiv>\n      <p style=\"margin:18px 0 0; font-size:15px; line-height:1.75; color:rgba(255,255,255,0.55); text-align:center;\">Discover worlds.<br>Experience stories.<br>Connect with creators.<\u002Fp>\n      <div style=\"width:46px; height:1px; margin:26px 0 0; background:rgba(255,255,255,0.55);\"><\u002Fdiv>\n      <div data-cta=\"\" style=\"display:flex; align-items:center; justify-content:space-between; width:100%; margin-top:auto; padding-top:24px;\">\n        <span style=\"font-size:12px; font-weight:600; letter-spacing:0.2em; color:#f0f0f0;\">ENTER EXPLORER PORTAL<\u002Fspan>\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f0f0f0\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"13 6 19 12 13 18\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fa>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 940 },\n  &quot;motionEnabled&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._cleanup = [];\n    const motion = this.props.motionEnabled ?? true;\n    requestAnimationFrame(() => { this.initCards(); if (motion) this.initParallax(); });\n  }\n  componentWillUnmount() { (this._cleanup || []).forEach(fn => fn()); }\n\n  initCards() {\n    const cards = Array.from(document.querySelectorAll('[data-tilt]'));\n    cards.forEach((card) => {\n      const glow = card.querySelector('[data-glow]');\n      const cta = card.querySelector('[data-cta]');\n      const red = card.getAttribute('data-accent') === 'red';\n      const onEnter = () => {\n        if (glow) glow.style.opacity = '1';\n        card.style.transform = 'translateY(-8px)';\n        card.style.borderColor = red ? 'rgba(232,0,45,0.85)' : 'rgba(255,255,255,0.32)';\n        card.style.boxShadow = red\n          ? '0 44px 100px rgba(0,0,0,0.6), 0 0 60px rgba(232,0,45,0.18)'\n          : '0 44px 100px rgba(0,0,0,0.6), 0 0 60px rgba(255,235,210,0.14)';\n        if (cta) cta.style.transform = 'translateX(4px)';\n      };\n      const onLeave = () => {\n        if (glow) glow.style.opacity = '0';\n        card.style.transform = 'translateY(0)';\n        card.style.borderColor = red ? 'rgba(232,0,45,0.5)' : 'rgba(255,255,255,0.12)';\n        card.style.boxShadow = '0 30px 80px rgba(0,0,0,0.55)' + (red ? ', inset 0 0 40px rgba(232,0,45,0.04)' : '');\n        if (cta) cta.style.transform = 'translateX(0)';\n      };\n      if (cta) cta.style.transition = 'transform .4s ease';\n      card.addEventListener('pointerenter', onEnter);\n      card.addEventListener('pointerleave', onLeave);\n      this._cleanup.push(() => { card.removeEventListener('pointerenter', onEnter); card.removeEventListener('pointerleave', onLeave); });\n    });\n  }\n\n  initParallax() {\n    const layers = Array.from(document.querySelectorAll('[data-parallax]'));\n    const onMove = (e) => {\n      const x = (e.clientX / window.innerWidth - 0.5);\n      const y = (e.clientY / window.innerHeight - 0.5);\n      layers.forEach((l) => {\n        const k = parseFloat(l.getAttribute('data-parallax')) || 0.4;\n        l.style.transform = `translate3d(${(-x*k*30).toFixed(1)}px, ${(-y*k*20).toFixed(1)}px, 0)`;\n      });\n    };\n    window.addEventListener('pointermove', onMove);\n    this._cleanup.push(() => window.removeEventListener('pointermove', onMove));\n  }\n\n  renderVals() {\n    return { motionAttr: (this.props.motionEnabled ?? true) ? 'on' : 'off' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"MOVIANX Portal.dc"}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap">
<script>
(function(){
  var d = document, BG = "#020203";
  // ---- page-transition overlay (survives bundler body re-render; never deadlocks on bfcache) ----
  // Bug fix: previously, on browser-Back the page restored from bfcache with the overlay still
  // 'covering' (opacity 1, pointer-events auto) from the outgoing navigation, so the Create/Explore
  // selector was unclickable until a refresh. Now a 'navigating' flag + a bfcache-aware pageshow
  // handler guarantee the overlay is cleared on return.
  var ov = d.createElement('div');
  ov.setAttribute('data-mx-overlay','1');
  ov.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:'+BG+';opacity:1;transition:opacity .45s ease;pointer-events:none;';
  var navigating = false;
  function attach(){ try{ if(!ov.isConnected) d.documentElement.appendChild(ov); }catch(e){} }
  function cover(){ attach(); ov.style.pointerEvents='auto'; ov.style.opacity='1'; }
  function uncover(){ attach(); ov.style.opacity='0'; ov.style.pointerEvents='none'; }
  cover();                                  // cover during the initial bundle decode
  function reveal(){ if (navigating) return; uncover(); }

  // ---- perf: pause infinite animations + drop GPU layers in OFFSCREEN sections ----
  // The bundles run continuous animations (marquee, node-graph float/nerve, ken-burns) even when
  // scrolled out of view, and pin ~22 will-change layers. That's the Explore scroll lag/freeze.
  // Pausing offscreen animations + releasing will-change is non-visual for anything on screen.
  var animIO = null;
  var FIXCSS = [
    // perf: pause offscreen animations + release their GPU layers
    '[data-mx-off] *{animation-play-state:paused !important;will-change:auto !important;}',
    // mobile scroll fix: links/cards/images are draggable by default, so on iOS a touch-drag over
    // a card/poster starts a native drag/callout instead of scrolling. Disable drag + callout and
    // keep vertical panning so a swipe over any media scrolls the page.
    'a,img,image-slot,[class*="mx-fc"],[class*="mx-rail"],[id^="mx-rail"]{-webkit-user-drag:none !important;-webkit-touch-callout:none !important;}',
    'image-slot,[class*="mx-fc"],[id^="mx-rail"]{touch-action:pan-y;}',
    // mobile overflow fix: keep the email-capture pill (and its button) inside the viewport
    '@media (max-width:560px){div:has(> input[type="email"]){max-width:calc(100vw - 28px) !important;box-sizing:border-box !important;}div:has(> input[type="email"]) > input[type="email"]{width:auto !important;flex:1 1 0 !important;min-width:0 !important;}}'
  ].join('');
  function perfStyle(){
    var el = d.getElementById('mx-perf-style');
    if (!el){ el = d.createElement('style'); el.id='mx-perf-style'; (d.head||d.documentElement).appendChild(el); }
    if (el.textContent !== FIXCSS) el.textContent = FIXCSS;
  }
  // form-fit: also enforce in JS (covers browsers without :has and the bundler's inline widths)
  function fixForms(){
    var mob = window.innerWidth <= 560;
    d.querySelectorAll('input[type="email"]').forEach(function(inp){
      var pill = inp.parentElement;
      if (pill && pill.style){ pill.style.maxWidth = mob?'calc(100vw - 28px)':''; pill.style.boxSizing = mob?'border-box':''; }
      inp.style.width = mob?'auto':''; inp.style.flex = mob?'1 1 0':''; inp.style.minWidth = mob?'0':'';
    });
  }
  function perfHarden(){
    perfStyle();
    if (!animIO){ try{ animIO = new IntersectionObserver(function(es){ es.forEach(function(e){
      if (e.isIntersecting) e.target.removeAttribute('data-mx-off'); else e.target.setAttribute('data-mx-off','');
    }); }, { rootMargin:'300px' }); }catch(e){ return; } }
    d.querySelectorAll('section').forEach(function(s){ if(!s.__mxObs){ s.__mxObs=1; try{ animIO.observe(s); }catch(e){} } });
  }

  function rewire(){
    d.querySelectorAll('a[href]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (/experience/i.test(h))            a.setAttribute('href','/explore');
      else if (/landing/i.test(h))          a.setAttribute('href','/creators');
      else if (/portal\.dc|portal\.html|MOVIANX%20Portal/i.test(h)) a.setAttribute('href','/');
    });
    d.querySelectorAll('a').forEach(function(a){
      var t = (a.textContent||'').toUpperCase().replace(/\s+/g,' ');
      if (/ENTER CREATOR PORTAL/.test(t))  a.setAttribute('href','/creators');
      if (/ENTER EXPLORER PORTAL/.test(t)) a.setAttribute('href','/explore');
    });
  }
  function fonts(){
    // brand spec: Inter Tight for display, Inter for body. The Portal ships in Archivo — remap it.
    d.querySelectorAll('[style*="Archivo"]').forEach(function(el){
      el.style.fontFamily = el.style.fontFamily.replace(/Archivo/g, "'Inter Tight'");
    });
  }
  function responsive(){
    var w = window.innerWidth;
    var cards = d.querySelectorAll('[data-tilt][data-accent]');
    if (cards.length >= 2){
      var row = cards[0].parentElement;
      var rootPad = row.closest('[data-motion]') || d.body;
      if (w <= 820){
        row.style.flexDirection='column'; row.style.alignItems='stretch'; row.style.gap='16px';
        row.style.maxWidth='440px'; row.style.margin='24px auto 0';
        cards.forEach(function(c){ c.style.flex='1 1 auto'; c.style.width='100%'; c.style.maxWidth='100%'; c.style.minHeight = w<=480?'300px':'360px'; });
        Array.from(row.children).forEach(function(ch){ if(!ch.hasAttribute('data-tilt')){ ch.style.flex='0 0 auto'; ch.style.padding='2px 0'; ch.style.minHeight='0'; }});
        if (rootPad && rootPad.style) rootPad.style.paddingBottom = '72px';   // breathing room + bounce at the end
      } else {
        row.style.flexDirection=''; row.style.alignItems=''; row.style.gap='';
        row.style.maxWidth = w>=1700?'1180px':''; row.style.margin = w>=1700?'':'';
        cards.forEach(function(c){ c.style.flex=''; c.style.width=''; c.style.maxWidth=''; c.style.minHeight=''; });
        Array.from(row.children).forEach(function(ch){ if(!ch.hasAttribute('data-tilt')){ ch.style.flex=''; ch.style.padding=''; ch.style.minHeight=''; }});
        if (rootPad && rootPad.style) rootPad.style.paddingBottom='';
      }
    } else if (w <= 820 && d.body && d.body.style) {
      d.body.style.paddingBottom = '48px';
    }
  }
  function bindNav(){
    d.querySelectorAll('a[href^="/"]').forEach(function(a){
      if (a.__mxbound) return; a.__mxbound = 1;
      a.addEventListener('click', function(ev){
        var href = a.getAttribute('href') || '';
        if (/^\/(creators|explore)?$/.test(href)){
          ev.preventDefault(); navigating = true; cover();
          setTimeout(function(){ window.location.href = href; }, 360);
        }
      });
    });
  }
  function run(){ try{ attach(); rewire(); fonts(); responsive(); bindNav(); perfHarden(); fixForms(); }catch(e){} }

  var tries = 0, iv = setInterval(function(){
    tries++; run();
    if (d.querySelector('a[data-tilt], nav a, h1, [data-mx-root]')) reveal();
    if (tries > 50){ reveal(); clearInterval(iv); }
  }, 150);
  try { new MutationObserver(run).observe(d.documentElement, { childList:true, subtree:true }); } catch(e){}
  window.addEventListener('resize', function(){ try{ responsive(); fixForms(); }catch(e){} });
  window.addEventListener('load', function(){ run(); setTimeout(reveal, 600); });
  // bfcache restore (browser Back/Forward): force the overlay clear so the selector is usable
  // again without a refresh — this is the Create/Explore navigation-lock fix.
  window.addEventListener('pageshow', function(e){ if (e.persisted){ navigating = false; uncover(); run(); } });
  // safety net: a tap when not mid-navigation guarantees the overlay is never a blocker
  window.addEventListener('pointerdown', function(){ if(!navigating) uncover(); }, true);
})();
</script>
